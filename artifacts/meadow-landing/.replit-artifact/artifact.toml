kind = "web"
previewPath = "/"
title = "Monet Landing Page"
version = "1.0.0"
id = "artifacts/meadow-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24718

[services.development]
run = "pnpm --filter @workspace/monet-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/monet-landing", "run", "build" ]
publicDir = "artifacts/meadow-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24718"
BASE_PATH = "/"
